<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak Surprise 🎉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a3d62 0%, #1e5f74 50%, #ff6b6b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto; /* allow scrolling on small screens */
            position: relative;
            padding: 20px; /* breathing room on mobile */
        }

        /* Moon */
        .moon {
            position: absolute;
            top: 40px;
            right: 40px;
            width: 100px;
            height: 100px;
            background: #f4f1de;
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(244, 241, 222, 0.5);
            animation: moonGlow 3s ease-in-out infinite;
        }

        @keyframes moonGlow {
            0%, 100% {
                box-shadow: 0 0 60px rgba(244, 241, 222, 0.5);
            }
            50% {
                box-shadow: 0 0 80px rgba(244, 241, 222, 0.8);
            }
        }

        /* Stars */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            text-align: center;
            z-index: 10;
            position: relative;
            width: 100%;
            max-width: 900px;
            padding: 24px 20px;
            margin-top: 60px; /* provide space from top elements */
        }

        .heading {
            font-size: 3rem;
            color: #f4f1de;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            animation: fadeInDown 1s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .button {
            padding: 20px 60px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #ff9f43, #ffb366);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 159, 67, 0.4);
            animation: fadeInUp 1s ease-out 0.2s both;
            position: relative;
            overflow: hidden;
            display: inline-block;
            min-width: 180px;
        }

        .button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s ease;
        }

        .button:hover::before {
            left: 100%;
        }

        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 159, 67, 0.6);
        }

        .button:active {
            transform: translateY(-1px);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Message Container */
        .message-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            width: auto;
            max-width: 95vw; /* keep container inside viewport */
            box-sizing: border-box;
            padding: 0 12px;
            max-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: visible;
        }

        .message-container.show {
            opacity: 1;
            pointer-events: auto;
        }

        .message-box {
            background: rgba(255, 255, 255, 0.95);
            padding: clamp(20px, 4vw, 50px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            text-align: center;
            backdrop-filter: blur(10px);
            max-width: 600px;
            margin: 0 12px;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.5) rotateX(0deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.05) rotateX(10deg);
            }
            100% {
                transform: scale(1) rotateX(0deg);
                opacity: 1;
            }
        }

        .message-box h1 {
            font-size: 2.5rem;
            color: #0a3d62;
            margin-bottom: 15px;
            animation: slideInLeft 0.8s ease-out 0.2s both;
        }

        .message-box p {
            font-size: 1.5rem;
            color: #ff9f43;
            font-weight: bold;
            letter-spacing: 1px;
            animation: slideInRight 0.8s ease-out 0.4s both;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Confetti Canvas */
        #confettiCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 80;
            pointer-events: none;
        }

        /* Fireworks Canvas */
        #fireworksCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 90;
            pointer-events: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .heading {
                font-size: 2rem;
                margin-bottom: 20px;
            }

            .button {
                padding: 15px 40px;
                font-size: 1.2rem;
                display: block;
                width: 90%;
                margin: 0 auto;
            }

            .moon {
                width: 70px;
                height: 70px;
                top: 30px;
                right: 20px;
            }

            .message-box {
                padding: 20px;
                max-width: 95vw;
            }

            .message-box h1 {
                font-size: 1.8rem;
            }

            .message-box p {
                font-size: 1.1rem;
            }

            .container {
                margin-top: 40px;
                padding: 18px 16px;
            }
        }

        /* Extra small screens */
        @media (max-width: 420px) {
            .heading {
                font-size: 1.5rem;
            }

            .button {
                font-size: 1rem;
                padding: 12px 20px;
                border-radius: 12px;
                min-width: 0;
            }

            .message-box h1 {
                font-size: 1.4rem;
            }

            .message-box p {
                font-size: 1rem;
            }

            .moon {
                width: 56px;
                height: 56px;
                top: 18px;
                right: 12px;
            }

            body {
                padding: 12px;
                align-items: flex-start; /* avoid vertical centering cutting content */
            }

            .container {
                margin-top: 200px;
                padding: 12px 10px;
            }

            /* Make the message container adapt to narrow viewports */
            .message-container {
                top: 50%;
                left: 50%;
                transform: translateX(-50%);
                max-width: 96vw;
                width: 96vw;
                padding: 0 8px;
                max-height: 84vh;
                overflow-y: auto;
                align-items: flex-start;
            }

            .message-container.show {
                pointer-events: auto;
            }

            .message-box {
                width: 100%;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Moon -->
    <div class="moon"></div>

    <!-- Stars will be generated by JavaScript -->

    <!-- Confetti Canvas -->
    <canvas id="confettiCanvas"></canvas>

    <!-- Fireworks Canvas -->
    <canvas id="fireworksCanvas"></canvas>

    <!-- Main Container -->
    <div class="container">
        <h1 class="heading">Click for Surprise 🎁</h1>
        <div style="margin-bottom:16px; display:flex; justify-content:center; align-items:center; gap:8px;">
            <label for="nameInput" style="color:#f4f1de; font-weight:600;">Name:</label>
            <input id="nameInput" type="text" placeholder="Enter your name" style="padding:10px 12px; border-radius:8px; border:none; min-width:200px;">
        </div>
        <button class="button" id="surpriseBtn">Click Here</button>
    </div>

    <!-- Message Container -->
    <div class="message-container" id="messageContainer">
        <div class="message-box">
            <h1>🌙 Eid Mubarak Everyone! 🎉</h1>
            <p>From Muhammad Iqrar</p>
        </div>
    </div>

    <script>
        // ===== Generate Stars =====
        function generateStars() {
            const starsCount = 50;
            for (let i = 0; i < starsCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                document.body.appendChild(star);
            }
        }

        // ===== Confetti Animation =====
        class Confetti {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.particles = [];
                this.animationId = null;

                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
            }

            resizeCanvas() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            create() {
                const colors = ['#ff9f43', '#ff6b6b', '#0a3d62', '#1e5f74', '#f4f1de', '#ffd93d'];
                const particleCount = 150;

                for (let i = 0; i < particleCount; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: -10,
                        size: Math.random() * 8 + 4,
                        speedY: Math.random() * 6 + 4,
                        speedX: (Math.random() - 0.5) * 8,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        rotation: Math.random() * 360,
                        rotationSpeed: (Math.random() - 0.5) * 15,
                        opacity: 1
                    });
                }
            }

            update() {
                this.particles = this.particles.filter(p => {
                    p.y += p.speedY;
                    p.x += p.speedX;
                    p.rotation += p.rotationSpeed;
                    p.opacity -= 0.01;

                    p.speedY += 0.1; // gravity

                    return p.opacity > 0 && p.y < this.canvas.height;
                });
            }

            draw() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                this.particles.forEach(p => {
                    this.ctx.save();
                    this.ctx.globalAlpha = p.opacity;
                    this.ctx.translate(p.x, p.y);
                    this.ctx.rotate((p.rotation * Math.PI) / 180);
                    this.ctx.fillStyle = p.color;
                    this.ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                    this.ctx.restore();
                });
            }

            animate() {
                this.update();
                this.draw();

                if (this.particles.length > 0) {
                    this.animationId = requestAnimationFrame(() => this.animate());
                } else {
                    cancelAnimationFrame(this.animationId);
                }
            }

            start() {
                this.create();
                this.animate();
            }
        }

        // ===== Fireworks Animation =====
        class Fireworks {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.particles = [];
                this.animationId = null;

                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
            }

            resizeCanvas() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            createFirework(x, y) {
                const colors = ['#ff6b6b', '#ffd93d', '#ff9f43', '#0a3d62', '#1e5f74'];
                const particleCount = 80;

                for (let i = 0; i < particleCount; i++) {
                    const angle = (i / particleCount) * Math.PI * 2;
                    const velocity = Math.random() * 8 + 4;

                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * velocity,
                        vy: Math.sin(angle) * velocity,
                        size: Math.random() * 4 + 2,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        opacity: 1,
                        decay: Math.random() * 0.015 + 0.01
                    });
                }
            }

            update() {
                this.particles = this.particles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1; // gravity
                    p.opacity -= p.decay;

                    return p.opacity > 0;
                });
            }

            draw() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                this.particles.forEach(p => {
                    this.ctx.globalAlpha = p.opacity;
                    this.ctx.fillStyle = p.color;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                });

                this.ctx.globalAlpha = 1;
            }

            animate() {
                this.update();
                this.draw();

                if (this.particles.length > 0) {
                    this.animationId = requestAnimationFrame(() => this.animate());
                }
            }

            start() {
                // Create multiple fireworks
                const positions = [
                    { x: window.innerWidth * 0.25, y: window.innerHeight * 0.3 },
                    { x: window.innerWidth * 0.75, y: window.innerHeight * 0.3 },
                    { x: window.innerWidth * 0.5, y: window.innerHeight * 0.2 },
                    { x: window.innerWidth * 0.35, y: window.innerHeight * 0.5 },
                    { x: window.innerWidth * 0.65, y: window.innerHeight * 0.5 }
                ];

                positions.forEach((pos, index) => {
                    setTimeout(() => {
                        this.createFirework(pos.x, pos.y);
                    }, index * 200);
                });

                this.animate();
            }
        }

        // ===== Play Sound =====
        function playCelebrationSound() {
            // Create audio context for tone generation
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
            const noteDuration = 0.2;
            const gap = 0.1;
            let currentTime = audioContext.currentTime;

            notes.forEach((frequency, index) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.frequency.value = frequency;
                oscillator.type = 'sine';

                gainNode.gain.setValueAtTime(0.3, currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, currentTime + noteDuration);

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.start(currentTime);
                oscillator.stop(currentTime + noteDuration);

                currentTime += noteDuration + gap;
            });

            // Add a celebratory chord at the end
            const chordStart = currentTime;
            const chordFrequencies = [523, 659, 784]; // C5, E5, G5

            chordFrequencies.forEach(frequency => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.frequency.value = frequency;
                oscillator.type = 'sine';

                gainNode.gain.setValueAtTime(0.2, chordStart);
                gainNode.gain.exponentialRampToValueAtTime(0.01, chordStart + 0.5);

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.start(chordStart);
                oscillator.stop(chordStart + 0.5);
            });
        }

        // ===== Initialize =====
        function init() {
            generateStars();

                const confettiCanvas = document.getElementById('confettiCanvas');
                const fireworksCanvas = document.getElementById('fireworksCanvas');
                const confetti = new Confetti(confettiCanvas);
                const fireworks = new Fireworks(fireworksCanvas);
                const button = document.getElementById('surpriseBtn');
                const messageContainer = document.getElementById('messageContainer');
                const nameInput = document.getElementById('nameInput');
                let hasClicked = false;

                button.addEventListener('click', () => {
                    if (hasClicked) return; // Prevent multiple clicks
                    hasClicked = true;

                    // Read name and update message
                    const name = nameInput ? nameInput.value.trim() : '';
                    const msgTitle = messageContainer.querySelector('h1');
                    if (name) {
                        msgTitle.textContent = `🌙 Eid Mubarak, ${name}! 🎉`;
                    } else {
                        msgTitle.textContent = '🌙 Eid Mubarak Everyone! 🎉';
                    }

                    // Show message
                    messageContainer.classList.add('show');

                    // Start animations
                    confetti.start();
                    setTimeout(() => fireworks.start(), 300);

                    // Play sound
                    playCelebrationSound();

                    // Reset after some time
                    setTimeout(() => {
                        hasClicked = false;
                        messageContainer.classList.remove('show');
                        // restore default title
                        msgTitle.textContent = '🌙 Eid Mubarak Everyone! 🎉';
                    }, 5000);
                });
        }

        // Start when page loads
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
